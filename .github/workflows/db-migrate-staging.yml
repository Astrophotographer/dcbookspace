name: DB migrate (staging)

# develop 브랜치에 supabase/migrations/ 변경이 푸시되면 자동으로 staging DB 에 적용.
# prod 는 db-migrate-prod.yml 에서 수동 트리거.

on:
  push:
    branches: [develop]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

jobs:
  apply:
    name: supabase db push → staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to staging
        run: supabase link --project-ref bqtxkkqgpgyviczyoqix
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_STAGING }}

      - name: Apply migrations
        run: supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_STAGING }}
