# 장소사용신청서 n8n stack.
#
# Usage:
#   cd n8n
#   cp .env.example .env
#   docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: dcbookspace-n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in n8n/.env}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: dcbookspace-n8n
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in n8n/.env}

      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?set N8N_ENCRYPTION_KEY in n8n/.env}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: true
      N8N_RUNNERS_ENABLED: true
      N8N_DIAGNOSTICS_ENABLED: false

      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_PORT: 5678
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://localhost:5678/}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-false}

      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Seoul}
      TZ: ${TZ:-Asia/Seoul}

      SITE_URL: ${SITE_URL:-http://host.docker.internal:3000}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      TELEGRAM_LINK_SECRET: ${TELEGRAM_LINK_SECRET:-}
      OFFICE_CHAT_ID: ${OFFICE_CHAT_ID:-}
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  n8n_data:
